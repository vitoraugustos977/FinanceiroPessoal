<mat-sidenav-container class="app-container">
  <mat-sidenav mode="side" opened class="sidenav">
    <div class="sidenav-header">
      <mat-icon class="logo-icon">account_balance_wallet</mat-icon>
      <span class="logo-text">Financeiro<br/><strong>Pessoal</strong></span>
    </div>

    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>
      <a mat-list-item routerLink="/transactions" routerLinkActive="active-link">
        <mat-icon matListItemIcon>receipt_long</mat-icon>
        <span matListItemTitle>Transações</span>
      </a>
      <a mat-list-item routerLink="/transactions/new" routerLinkActive="active-link">
        <mat-icon matListItemIcon>add_circle</mat-icon>
        <span matListItemTitle>Novo Lançamento</span>
      </a>
      <a mat-list-item routerLink="/categories" routerLinkActive="active-link">
        <mat-icon matListItemIcon>label</mat-icon>
        <span matListItemTitle>Categorias</span>
      </a>
      <a mat-list-item routerLink="/objectives" routerLinkActive="active-link">
        <mat-icon matListItemIcon>flag</mat-icon>
        <span matListItemTitle>Objetivos</span>
      </a>
      <a mat-list-item routerLink="/settings" routerLinkActive="active-link">
        <mat-icon matListItemIcon>settings</mat-icon>
        <span matListItemTitle>Opções</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="main-content">
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
